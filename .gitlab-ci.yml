stages:
  - build
  - deploy

variables:
  # На SourceCraft встроенный Docker Registry, переменные предоставляются автоматически
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE -t $CI_REGISTRY_IMAGE:latest .
    - docker push $DOCKER_IMAGE
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - master

deploy_server:
  stage: deploy
  image: alpine:latest
  # Пример прямого деплоя на сервер через SSH с использованием Docker
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    # Идем на сервер, обтягиваем новый образ, рестартим контейнер
    - ssh root@$SERVER_IP "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
    - ssh root@$SERVER_IP "docker pull $DOCKER_IMAGE"
    - ssh root@$SERVER_IP "docker rm -f my-frontend || true"
    - ssh root@$SERVER_IP "docker run -d -p 80:80 --name my-frontend --restart always $DOCKER_IMAGE"
  environment:
    name: production
  only:
    - main
    - master
